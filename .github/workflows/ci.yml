name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ["9.12.2"]
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Guile and pytest
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ hashFiles('ychr.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: cabal update
        run: cabal update

      - name: make test
        run: make test
